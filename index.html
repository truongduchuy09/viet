<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biển Đảo Việt Nam </title>
    <style>
        /* Xóa khoảng trắng thừa và tràn màn hình */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #e0f4f9;
            overflow: hidden; /* Ẩn thanh cuộn */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Giữ tỷ lệ áp phích */
            display: block;
        }

        area {
            outline: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="image.jpg" usemap="#image-map" id="poster">

    <map name="image-map">
        <area target="_blank" alt="nhận thức" title="nhận thức" href="https://www.youtube.com/" coords="30,172,487,284" shape="rect">
        <area target="_blank" alt="chủ quyền" title="chủ quyền" href="https://www.youtube.com/" coords="31,289,489,403" shape="rect">
        <area target="_blank" alt="kinh tế" title="kinh tế" href="https://www.youtube.com/" coords="31,417,486,525" shape="rect">
        <area target="_blank" alt="cộng đồng" title="cộng đồng" href="https://www.youtube.com/" coords="32,542,485,650" shape="rect">
        
        <area target="_blank" alt="nội dung" title="nội dung" href="https://www.youtube.com/" coords="919,175,1356,272" shape="rect">
        <area target="_blank" alt="giáo dục và cộng đồng" title="giáo dục và cộng đồng" href="https://www.youtube.com/" coords="919,299,1360,399" shape="rect">
        <area target="_blank" alt="truyền thong" title="truyền thong" href="https://www.youtube.com/" coords="919,420,1359,524" shape="rect">
        <area target="_blank" alt="văn hoá" title="văn hoá" href="https://www.youtube.com/" coords="921,543,1353,649" shape="rect">
    </map>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jQuery-rwdImageMaps/1.6/jquery.rwdImageMaps.min.js"></script>
<script>
    $(document).ready(function(e) {
        // Lệnh kích hoạt tính năng tự căn chỉnh tọa độ
        $('img[usemap]').rwdImageMaps();
    });
</script>

</body>
</html>
