<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truyền thông về Biển đảo Việt Nam</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #e0f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }
        .infographic-wrapper {
            position: relative;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
            border-radius: 15px;
            overflow: hidden;
            max-width: 1000px; /* Khớp với chiều rộng ảnh gốc của bạn */
        }
        img {
            width: 100%;
            height: auto;
            display: block;
        }
        area { outline: none; }
    </style>
</head>
<body>

<div class="infographic-wrapper">
    <img src="image.jpg" usemap="#infographic-map" id="info-img">

    <map name="infographic-map">
        <area shape="rect" coords="30,250,200,450" alt="Nhận thức" href="https://vtv.vn/bien-dao-viet-nam.tag" target="_blank">
        <area shape="rect" coords="215,250,385,450" alt="Chủ quyền" href="https://biendao.gov.vn/" target="_blank">
        <area shape="rect" coords="30,530,200,730" alt="Kinh tế" href="https://www.youtube.com/results?search_query=kinh+tế+biển+việt+nam" target="_blank">
        <area shape="rect" coords="215,530,385,730" alt="Cộng đồng" href="https://www.google.com/search?q=gắn+kết+cộng+đồng+biển+đảo" target="_blank">

        <area shape="circle" coords="610,480,40" alt="Hoàng Sa" href="https://vi.wikipedia.org/wiki/Quần_đảo_Hoàng_Sa" target="_blank">
        <area shape="circle" coords="610,710,40" alt="Trường Sa" href="https://vi.wikipedia.org/wiki/Quần_đảo_Trường_Sa" target="_blank">

        <area shape="rect" coords="630,240,970,390" alt="Thông tin" href="https://vtv.vn/truyen-hinh.htm" target="_blank">
        <area shape="rect" coords="630,410,970,530" alt="Hoạt động" href="https://www.youtube.com/results?search_query=triển+lãm+biển+đảo" target="_blank">
        <area shape="rect" coords="630,550,970,700" alt="Số" href="https://www.tiktok.com/search?q=biển+đảo+việt+nam" target="_blank">
        <area shape="rect" coords="630,720,970,850" alt="Nội dung" href="https://www.google.com/search?q=lịch+sử+pháp+lý+biển+đảo+việt+nam" target="_blank">
    </map>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jQuery-rwdImageMaps/1.6/jquery.rwdImageMaps.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $(document).ready(function(e) {
        $('img[usemap]').rwdImageMaps();
    });
</script>

</body>
</html>
